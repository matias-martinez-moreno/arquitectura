{% extends 'tienda_app/base.html' %}

{% block title %}Compra Rápida - {{ libro.titulo }}{% endblock %}

{% block content %}
<div class="card p-4">
    <h1 class="h3 mb-4 text-center text-warning">⚡ Compra Rápida</h1>

    <div class="text-center mb-4">
        <h2 class="h4">{{ libro.titulo }}</h2>
        <p class="text-muted small">{{ libro.descripcion|truncatewords:20 }}</p>
        <div class="bg-light p-3 rounded">
            <p class="mb-0">Total a pagar:</p>
            <h4 class="mb-0 text-success">${{ total|floatformat:2 }} USD</h4>
        </div>
    </div>

    <form method="post" class="text-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">
            Pagar Ahora (Express)
        </button>
    </form>
</div>
{% endblock %}
